<!DOCTYPE html>
<html>
<head>
  <title>Pro Logo Maker</title>

  <!-- download same design -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f2027;
      color: white;
    }

    input {
      padding: 10px;
      width: 70%;
      margin: 15px;
    }

    button {
      padding: 10px 15px;
      background: #00ffd5;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }

    .logo-box {
      margin-top: 20px;
    }

    .logo {
      padding: 15px;
      font-size: 30px;
      border-radius: 10px;
      margin-bottom: 10px;
      color: white; /* 👈 sab white */
    }

    /* Different designs */
    .style1 { font-weight: bold; letter-spacing: 2px; }
    .style2 { font-family: cursive; text-shadow: 2px 2px 10px black; }
    .style3 { letter-spacing: 5px; border-bottom: 2px solid white; }
    .style4 { background: black; display: inline-block; padding: 10px 20px; }
    .style5 { font-size: 40px; text-shadow: 0 0 15px white; }
  </style>
</head>

<body>

<h1>Pro Logo Maker 🎨🔥</h1>

<input type="text" id="name" placeholder="Enter your name"><br>

<button onclick="makeLogo()">Generate Logos</button>

<div id="logos"></div>

<script>
function downloadLogo(element) {
  html2canvas(element).then(canvas => {
    let link = document.createElement("a");
    link.download = "logo.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

function makeLogo() {
  let name = document.getElementById("name").value;

  document.getElementById("logos").innerHTML = `
    <div class="logo-box">
      <div class="logo style1">${name}</div>
      <button onclick="downloadLogo(this.previousElementSibling)">Download</button>
    </div>

    <div class="logo-box">
      <div class="logo style2">${name}</div>
      <button onclick="downloadLogo(this.previousElementSibling)">Download</button>
    </div>

    <div class="logo-box">
      <div class="logo style3">${name.toUpperCase()}</div>
      <button onclick="downloadLogo(this.previousElementSibling)">Download</button>
    </div>

    <div class="logo-box">
      <div class="logo style4">${name}</div>
      <button onclick="downloadLogo(this.previousElementSibling)">Download</button>
    </div>

    <div class="logo-box">
      <div class="logo style5">${name}</div>
      <button onclick="downloadLogo(this.previousElementSibling)">Download</button>
    </div>
  `;
}
</script>

</body>
  </html>
