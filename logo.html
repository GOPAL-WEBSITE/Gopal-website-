<!DOCTYPE html>
<html>
<head>
  <title>Pro Logo Maker</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f2027;
      color: white;
    }

    input {
      padding: 10px;
      width: 70%;
      margin: 15px;
    }

    button {
      padding: 10px 15px;
      background: #00ffd5;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }

    .logo-box {
      margin-top: 20px;
    }

    .logo {
      padding: 15px;
      font-size: 30px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .style1 { color: #00ffd5; text-shadow: 2px 2px 10px black; }
    .style2 { color: yellow; font-family: cursive; }
    .style3 { color: red; letter-spacing: 3px; }
    .style4 { color: white; background: black; display: inline-block; }
    .style5 { color: #00ff88; font-weight: bold; font-size: 35px; }
  </style>
</head>

<body>

<h1>Pro Logo Maker 🎨🔥</h1>

<input type="text" id="name" placeholder="Enter your name"><br>

<button onclick="makeLogo()">Generate Logos</button>

<div id="logos"></div>

<script>
function downloadLogo(text) {
  let canvas = document.createElement("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = 800;
  canvas.height = 200;

  ctx.fillStyle = "#0f2027";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffd5";
  ctx.font = "40px Arial";
  ctx.fillText(text, 50, 100);

  let link = document.createElement("a");
  link.download = "logo.png";
  link.href = canvas.toDataURL();
  link.click();
}

function makeLogo() {
  let name = document.getElementById("name").value;

  document.getElementById("logos").innerHTML = `
    <div class="logo-box">
      <div class="logo style1">🔥 ${name} 🔥</div>
      <button onclick="downloadLogo('🔥 ${name} 🔥')">Download</button>
    </div>

    <div class="logo-box">
      <div class="logo style2">✨ ${name} ✨</div>
      <button onclick="downloadLogo('✨ ${name} ✨')">Download</button>
    </div>

    <div class="logo-box">
      <div class="logo style3">${name.toUpperCase()}</div>
      <button onclick="downloadLogo('${name.toUpperCase()}')">Download</button>
    </div>

    <div class="logo-box">
      <div class="logo style4">🚀 ${name} 🚀</div>
      <button onclick="downloadLogo('🚀 ${name} 🚀')">Download</button>
    </div>

    <div class="logo-box">
      <div class="logo style5">${name}</div>
      <button onclick="downloadLogo('${name}')">Download</button>
    </div>
  `;
}
</script>

</body>
</html>
