<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Money 💰</title>

<style>
body {background:#111;color:white;text-align:center;font-family:Arial;}
.card {background:#1e1e1e;margin:15px;padding:20px;border-radius:15px;}
button {padding:10px;margin:5px;border:none;border-radius:10px;background:#00ff99;font-weight:bold;}
#coins {font-size:30px;color:#00ff99;}
</style>
</head>

<body>

<h1>💰 Earn Dashboard</h1>

<div class="card">
  <h2>Your Coins</h2>
  <p id="coins">0</p>
  <p>50 Coins = ₹1</p>
</div>

<div class="card">
  <h2>Tasks</h2>

  <button onclick="useTool()">Use Tool (+20)</button>
  <button onclick="shareTask()">Share (+30)</button>
  <button onclick="spin()">Spin & Win 🎰</button>

  <p id="msg"></p>
</div>

<div class="card">
  <h2>👥 Referral</h2>
  <input id="refInput" placeholder="Enter Referral Code">
  <button onclick="applyRef()">Apply</button>
  <p id="refMsg"></p>
</div>

<div class="card">
  <h2>💸 Withdraw</h2>
  <a href="withdraw.html"><button>Go to Withdraw</button></a>
</div>

<script>

// Coins load
let coins = parseInt(localStorage.getItem("coins")) || 0;
document.getElementById("coins").innerText = coins;

// DAILY LOGIN AUTO (REAL)
let today = new Date().toDateString();

if(localStorage.getItem("lastLogin") !== today){
  coins += 10;
  localStorage.setItem("coins", coins);
  localStorage.setItem("lastLogin", today);
  alert("🎉 Daily Login Reward +10 Coins");
}

// ADD COINS FUNCTION
function addCoins(c){
  coins += c;
  localStorage.setItem("coins", coins);
  document.getElementById("coins").innerText = coins;
}

// USE TOOL (REAL REDIRECT)
function useTool(){
  window.open("logo.html", "_blank");

  setTimeout(()=>{
    addCoins(20);
    document.getElementById("msg").innerText="✅ Tool Used +20 Coins";
  },5000);
}

// SHARE TASK (REAL SHARE)
function shareTask(){
  if(navigator.share){
    navigator.share({
      title:"Earn Money 💰",
      text:"Join and earn real money 😎",
      url:window.location.href
    }).then(()=>{
      addCoins(30);
    });
  } else {
    alert("Sharing not supported");
  }
}

// SPIN WHEEL
function spin(){
  let rewards = [10,20,30,50,100];
  let win = rewards[Math.floor(Math.random()*rewards.length)];

  setTimeout(()=>{
    addCoins(win);
    alert("🎰 You won "+win+" coins!");
  },1000);
}

// REFERRAL SYSTEM (BASIC REAL)
function applyRef(){
  let code = document.getElementById("refInput").value;

  if(code && !localStorage.getItem("refUsed")){
    addCoins(200);
    localStorage.setItem("refUsed", true);
    document.getElementById("refMsg").innerText="✅ Referral Applied +200 Coins";
  } else {
    document.getElementById("refMsg").innerText="❌ Invalid or Already Used";
  }
}

</script>

</body>
</html>
