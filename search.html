<!DOCTYPE html>
<html>
<head>
  <title>Search Tool</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f2027;
      color: white;
    }

    input {
      padding: 10px;
      width: 60%;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: #00ffd5;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Search Anything 🔎</h1>

<input type="text" id="searchBox" placeholder="Type something..."><br>

<button onclick="search()">Search</button>

<script>
function search() {
  let query = document.getElementById("searchBox").value;
  window.location.href = "https://www.google.com/search?q=" + query;
}
</script>

</body>
</html>
