<!DOCTYPE html>
<html>
<head>
  <title>Resume Builder</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f2027;
      color: white;
    }

    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: #00ffd5;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }

    #resume {
      margin-top: 20px;
      background: white;
      color: black;
      padding: 20px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

<h1>Resume Builder 💼</h1>

<input type="text" id="name" placeholder="Enter your name"><br>
<input type="text" id="skills" placeholder="Enter your skills"><br>
<textarea id="education" placeholder="Enter your education"></textarea><br>

<button onclick="createResume()">Create Resume</button>
<button onclick="downloadResume()">Download Resume</button>

<div id="resume"></div>

<script>
function createResume() {
  let name = document.getElementById("name").value;
  let skills = document.getElementById("skills").value;
  let education = document.getElementById("education").value;

  document.getElementById("resume").innerHTML =
    "<h2>" + name + "</h2>" +
    "<p><b>Skills:</b> " + skills + "</p>" +
    "<p><b>Education:</b> " + education + "</p>";
}

function downloadResume() {
  let content = document.getElementById("resume").innerText;

  let blob = new Blob([content], { type: "text/plain" });
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "resume.txt";
  a.click();
}
</script>

</body>
</html>
