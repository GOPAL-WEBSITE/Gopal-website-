<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="google-site-verification" content="0EBnpyVJHNtBlCCXtidrIBJwQ6HvzOOJE4pi8WkhG9k" />

  <title>Gopal Tools Hub 🚀</title>

  <link rel="icon" href="favicon.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: white;
    }

    header img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #ddd;
      object-fit: cover;
    }

    h1 {
      margin-top: 10px;
    }

    section {
      padding: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 15px;
      text-decoration: none;
      color: black;
      font-weight: bold;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      background: #00ffd5;
    }

    footer {
      margin-top: 30px;
      padding: 15px;
      background: #000;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <img src="profile.jpg" alt="Profile">
  <h1>Gopal Tools Hub 🚀</h1>
  <p>All-in-One Free Tools 🔥</p>
</header>

<section>

  <h2>🛠️ Tools</h2>

  <div class="grid">

    <a href="qr.html" class="card">QR Generator</a>
    <a href="resume.html" class="card">Resume Builder</a>

    <a href="converter.html" class="card">Image Converter</a>
    <a href="search.html" class="card">Search Tool</a>

    <a href="invoice.html" class="card">Invoice Generator</a>
    <a href="logo.html" class="card">Logo Maker</a>

    <a href="pdf.html" class="card">PDF Tool</a>
    <a href="share.html" class="card">Share Tool</a>

  </div>

</section>

<footer>
  <p>© 2026 Gopal</p>
</footer>

</body>
</html>
