<!DOCTYPE html>
<html>
<head>
  <title>Invoice Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f2027;
      color: white;
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: #00ffd5;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }

    #invoice {
      margin-top: 20px;
      background: white;
      color: black;
      padding: 20px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

<h1>Invoice Generator 💼</h1>

<input type="text" id="name" placeholder="Customer Name"><br>
<input type="text" id="item" placeholder="Item Name"><br>
<input type="number" id="amount" placeholder="Amount"><br>

<button onclick="createInvoice()">Generate Invoice</button>
<button onclick="downloadInvoice()">Download Invoice</button>

<div id="invoice"></div>

<script>
function createInvoice() {
  let name = document.getElementById("name").value;
  let item = document.getElementById("item").value;
  let amount = document.getElementById("amount").value;

  document.getElementById("invoice").innerHTML =
    "<h2>Invoice</h2>" +
    "<p><b>Customer:</b> " + name + "</p>" +
    "<p><b>Item:</b> " + item + "</p>" +
    "<p><b>Amount:</b> ₹" + amount + "</p>";
}

function downloadInvoice() {
  let content = document.getElementById("invoice").innerText;

  let blob = new Blob([content], { type: "text/plain" });
  let a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "invoice.txt";
  a.click();
}
</script>

</body>
  </html>
